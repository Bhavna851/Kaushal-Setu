<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Internship Portal - Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4" style="color: #003366; font-weight: bold;">Create Account</h3>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} text-center py-2">{{ message }}</div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Full Name</label>
                        <input type="text" name="full_name" class="form-control" placeholder="Enter full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="name@domain.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>

                        <div class="input-group">
                            <input type="password" id="password" name="password" class="form-control"
                                placeholder="Create secure password" required>

                            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                                👁️
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn w-100 text-white p-2" style="background-color: #003366;">
                        Register Candidate
                    </button>
                </form>
                <div class="text-center mt-3">
                    <p class="small text-muted">Already registered? <a href="{{ url_for('main.login') }}"
                            style="color: #003366;">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
    <script>
        function toggleSignupPassword() {
            const pass = document.getElementById("signupPassword");

            if (pass.type === "password") {
                pass.type = "text";
            } else {
                pass.type = "password";
            }
        }
    </script>
</body>

</html>
