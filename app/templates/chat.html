<!DOCTYPE html>
<html>

<head>
    <title>Kaushal Setu - Smart Internship Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {

            min-height: 100vh;
            background: linear-gradient(135deg, #eef5ff, #ffffff);
            font-family: 'Segoe UI', sans-serif;

        }

        .chat-container {

            max-width: 750px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);

        }


        /* Header */

        .chat-header {

            background: linear-gradient(135deg, #003366, #0059b3);
            color: white;
            padding: 25px;
            text-align: center;

        }


        .chat-header h3 {

            font-weight: 700;
            margin-bottom: 8px;

        }


        .chat-header p {

            margin: 0;
            font-size: 14px;
            opacity: 0.9;

        }

        /* Messages Area */

        #chatLogs {

            height: 450px;
            overflow-y: auto;
            padding: 25px;
            background: #f8fbff;

        }



        #chatLogs::-webkit-scrollbar {

            width: 7px;

        }


        #chatLogs::-webkit-scrollbar-thumb {

            background: #aac7ff;
            border-radius: 10px;

        }



        /* User Message */

        .user-message {

            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;

        }


        .user-message span {

            background: #0059b3;
            color: white;
            padding: 12px 18px;
            border-radius: 18px 18px 0 18px;
            max-width: 70%;

        }




        /* Bot Message */

        .bot-message {

            display: flex;
            justify-content: flex-start;
            margin-bottom: 15px;

        }


        .bot-message span {

            background: white;
            color: #333;
            padding: 12px 18px;
            border-radius: 18px 18px 18px 0;
            max-width: 75%;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);

        }




        /* Input */

        .input-area {

            padding: 20px;
            border-top: 1px solid #eee;

        }



        #chatInput {

            border-radius: 25px;
            padding: 12px 20px;
            border: 1px solid #ccd9ff;

        }



        #chatInput:focus {

            border-color: #0059b3;
            box-shadow: 0 0 8px rgba(0, 89, 179, 0.2);

        }




        .send-btn {

            border-radius: 25px;
            padding: 10px 25px;
            background: #003366;
            border: none;
            font-weight: 600;

        }



        .send-btn:hover {

            background: #0059b3;

        }



        @media(max-width:768px) {

            .chat-container {

                margin: 20px;

            }


            #chatLogs {

                height: 400px;

            }

        }
    </style>


</head>



<body>


    <div class="chat-container">



        <div class="chat-header">


            <h3>
                🤖 Kaushal Setu Assistant
            </h3>


            <p>
                Find internships based on your skills, education and location
            </p>


        </div>





        <div id="chatLogs">

        </div>





        <div class="input-area">


            <div class="input-group">


                <input type="text" id="chatInput" class="form-control" placeholder="Ask about internships...">



                <button class="btn btn-primary send-btn" onclick="sendChat()">

                    Send

                </button>


            </div>


        </div>



    </div>

        <script>


        async function sendChat() {


            let input = document.getElementById("chatInput");

            let msg = input.value.trim();


            if (msg === "")
                return;



            let logs = document.getElementById("chatLogs");



            logs.innerHTML += `

    <div class="user-message">

        <span>
            ${msg}
        </span>

    </div>

    `;



            input.value = "";




            let response = await fetch("/chatbot", {

                method: "POST",

                headers: {

                    "Content-Type": "application/json"

                },


                body: JSON.stringify({

                    message: msg

                })


            });



            let data = await response.json();




            logs.innerHTML += `


    <div class="bot-message">

        <span>

            ${data.reply}

        </span>

    </div>


    `;




            logs.scrollTop = logs.scrollHeight;


        }





        document
            .getElementById("chatInput")
            .addEventListener("keypress", function (event) {


                if (event.key === "Enter") {

                    sendChat();

                }


            });



    </script>



</body>

</html>
